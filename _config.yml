title: Auditorium des Champs Libres - Fiche Technique
email: d.seignard@leschampslibres.fr
description: >- 
  Fiche technique complète de l'Auditorium des Champs Libres à Rennes. 
  Équipements audio, lumière, vidéo et caractéristiques techniques de la salle.
baseurl: "" 
url: "https://techauditolclrennes.github.io" 
twitter_username: 
github_username: TechAuditoLCLRennes

# Build settings
remote_theme: benbalter/retlab
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-language-plugin


# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

nav_pages:
  - index.md
  - lights.md
  - audio.md
  - video_reseau.md
  - contact.md
  - views.md
  - map.md

footer_pages:
  - books.md
  - fine-print.md

defaults:
  -
    scope:
      path: "_posts"
      type: "posts"
    values:
      layout: post
      comments: true
  -
    scope:
      path: "_pages"
      type: "pages"
    values:
      layout: page
      comments: false