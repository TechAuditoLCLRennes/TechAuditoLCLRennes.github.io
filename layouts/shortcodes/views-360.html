<div class="views-container" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px 0;">
  <!-- Panorama 1 -->
  <div class="view-card" style="text-align: center;">
    <h4 style="margin-bottom: 10px;">Panorama 360° - Vue 1</h4>
    <div class="pano1" style="width: 450px; height: 300px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden;"></div>
  </div>
  
  <!-- Panorama 2 -->
  <div class="view-card" style="text-align: center;">
    <h4 style="margin-bottom: 10px;">Panorama 360° - Vue 2</h4>
    <div class="pano2" style="width: 450px; height: 300px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden;"></div>
  </div>
  
  <!-- Image Panorama -->
  <div class="view-card" style="text-align: center;">
    <h4 style="margin-bottom: 10px;">Vue panoramique</h4>
    <img style="width: 450px; height: 283px; border-radius: 8px; object-fit: cover;" 
         src="/assets/img/pano1-1_stitch2.jpg" 
         alt="Panorama 360° de l'intérieur de l'Auditorium des Champs Libres" />
  </div>
  
  <!-- Modèle 3D GLTF -->
  <div class="view-card" style="text-align: center;">
    <h4 style="margin-bottom: 10px;">Modèle 3D de l'Auditorium</h4>
    <div id="gltf" style="width: 450px; height: 300px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden;"></div>
  </div>
</div>

<!-- Three.js pour le modèle 3D -->
<script src="/assets/js/three.min.js"></script>
<script src="/assets/js/OrbitControls.js"></script>
<script src="/assets/js/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/DRACOLoader.js"></script>
<!-- Panolens pour les panoramas 360 -->
<script src="/assets/js/panolens.min.js"></script>

<script>
(function() {
  // Cache-busting pour forcer le rechargement
  const cacheBuster = '?v=' + Date.now();
  
  // Vérification que les conteneurs existent
  const pano1Container = document.querySelector(".pano1");
  const pano2Container = document.querySelector(".pano2");
  const gltfContainer = document.querySelector("#gltf");
  
  // Initialisation des panoramas 360°
  if (typeof PANOLENS !== 'undefined' && pano1Container && pano2Container) {
    try {
      // PANOLENS CubePanorama order: +x (right), -x (left), +y (up/top), -y (down/bottom), +z (front), -z (back)
      
      // Panorama 1 - cube1
      const path1 = "/assets/virtual_cubes/cube1/";
      const panorama1 = new PANOLENS.CubePanorama([
        path1 + 'right.jpg' + cacheBuster,
        path1 + 'left.jpg' + cacheBuster,
        path1 + 'top.jpg' + cacheBuster,
        path1 + 'bottom.jpg' + cacheBuster,
        path1 + 'front.jpg' + cacheBuster,
        path1 + 'back.jpg' + cacheBuster
      ]);
      
      // Panorama 2 - cube2 (DIFFÉRENT de cube1!)
      const path2 = "/assets/virtual_cubes/cube2/";
      const panorama2 = new PANOLENS.CubePanorama([
        path2 + 'right.jpg' + cacheBuster,
        path2 + 'left.jpg' + cacheBuster,
        path2 + 'top.jpg' + cacheBuster,
        path2 + 'bottom.jpg' + cacheBuster,
        path2 + 'front.jpg' + cacheBuster,
        path2 + 'back.jpg' + cacheBuster
      ]);
      
      const viewer1 = new PANOLENS.Viewer({
        container: pano1Container,
        controlButtons: ["fullscreen"],
        viewIndicator: true,
        autoRotate: true,
        autoRotateSpeed: 0.3
      });
      viewer1.add(panorama1);
      
      const viewer2 = new PANOLENS.Viewer({
        container: pano2Container,
        controlButtons: ["fullscreen"],
        viewIndicator: true,
        autoRotate: true,
        autoRotateSpeed: 0.3
      });
      viewer2.add(panorama2);
      
      console.log('Panoramas 360° initialisés');
      console.log('Panorama 1 images:', path1);
      console.log('Panorama 2 images:', path2);
    } catch (error) {
      console.error('Erreur panoramas:', error);
      pano1Container.innerHTML = '<p style="color: red; padding: 20px;">Erreur de chargement du panorama 1</p>';
      pano2Container.innerHTML = '<p style="color: red; padding: 20px;">Erreur de chargement du panorama 2</p>';
    }
  } else {
    console.warn('PANOLENS non disponible ou conteneurs manquants');
  }
  
  // Initialisation du modèle 3D GLTF
  if (typeof THREE !== 'undefined' && gltfContainer) {
    try {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf0f0f0);
      
      const camera = new THREE.PerspectiveCamera(50, gltfContainer.clientWidth / gltfContainer.clientHeight, 0.1, 1000);
      camera.position.set(8, 4, 8);
      
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(gltfContainer.clientWidth, gltfContainer.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      gltfContainer.appendChild(renderer.domElement);
      
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.1;
      controls.minDistance = 3;
      controls.maxDistance = 20;
      
      // Éclairage
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 10, 5);
      scene.add(directionalLight);
      
      const light = new THREE.HemisphereLight(0xbbbbff, 0x444422);
      scene.add(light);
      
      const loader = new THREE.GLTFLoader();
      
      // Configurer DRACOLoader pour les modèles compressés avec Draco
      const dracoLoader = new THREE.DRACOLoader();
      dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
      dracoLoader.setDecoderConfig({ type: 'js' });
      loader.setDRACOLoader(dracoLoader);
      
      // Utiliser venue3D.glb avec cache-busting
      loader.load('/assets/3D/venue3D.glb' + cacheBuster, function(gltf) {
        // Centrer et scaler le modèle
        const box = new THREE.Box3().setFromObject(gltf.scene);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 4 / maxDim;
        gltf.scene.scale.multiplyScalar(scale);
        gltf.scene.position.sub(center.multiplyScalar(scale));
        
        scene.add(gltf.scene);
        console.log('Modèle 3D venue3D.glb chargé avec succès');
      }, function(progress) {
        console.log('Chargement 3D:', (progress.loaded / progress.total * 100) + '%');
      }, function(error) {
        console.error('Erreur chargement venue3D.glb:', error);
        // Fallback vers planes.glb
        loader.load('/assets/3D/planes.glb' + cacheBuster, function(gltf) {
          scene.add(gltf.scene);
          console.log('Modèle 3D planes.glb chargé (fallback)');
        });
      });
      
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
      
      // Resize handler
      window.addEventListener('resize', function() {
        const width = gltfContainer.clientWidth;
        const height = gltfContainer.clientHeight;
        renderer.setSize(width, height);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      });
      
    } catch (error) {
      console.error('Erreur modèle 3D:', error);
      gltfContainer.innerHTML = '<p style="color: red; padding: 20px;">Erreur de chargement du modèle 3D</p>';
    }
  }
})();
</script>
