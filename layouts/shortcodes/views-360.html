<style>
.views-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 24px;
  padding: 16px 0;
}
.view-card {
  text-align: center;
}
.view-card h4 {
  margin: 0 0 8px 0;
  font-size: 0.95rem;
  font-weight: 600;
}
.view-canvas {
  width: 450px;
  height: 300px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #ddd;
  display: block;
}
</style>

<div class="views-grid">
  <div class="view-card">
    <h4>Panorama 360° - Vue 1</h4>
    <iframe src="/pano-viewer.html?cube=cube1" class="view-canvas" frameborder="0" allowfullscreen></iframe>
  </div>
  <div class="view-card">
    <h4>Panorama 360° - Vue 2</h4>
    <iframe src="/pano-viewer.html?cube=cube2" class="view-canvas" frameborder="0" allowfullscreen></iframe>
  </div>
  <div class="view-card">
    <h4>Vue panoramique</h4>
    <img class="view-canvas" style="object-fit: cover;"
         src="/assets/img/pano1-1_stitch2.jpg"
         alt="Vue panoramique de l'Auditorium des Champs Libres" />
  </div>
  <div class="view-card">
    <h4>Modèle 3D de l'Auditorium</h4>
    <div id="gltf-viewer" class="view-canvas"></div>
  </div>
</div>

<!-- Three.js pour le modèle 3D (chargé après les iframes) -->
<script src="/assets/js/three.min.js"></script>

<script>
(function initGltfViewer() {
  var container = document.getElementById('gltf-viewer');
  if (!container) return;

  // Sauvegarder la référence THREE créée par PANOLENS, puis la réutiliser
  // PANOLENS a déjà chargé Three.js r105 - on le réutilise directement
  var T = window.THREE;
  if (!T) { container.innerHTML = '<p style="padding:20px;color:red">Three.js non disponible</p>'; return; }

  var scene = new T.Scene();
  scene.background = new T.Color(0xeeeeee);

  var w = container.clientWidth || 450;
  var h = container.clientHeight || 300;
  var camera = new T.PerspectiveCamera(45, w / h, 0.01, 1000);
  camera.position.set(10, 6, 10);

  var renderer = new T.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  // Éclairage
  scene.add(new T.AmbientLight(0xffffff, 0.7));
  var dir = new T.DirectionalLight(0xffffff, 0.8);
  dir.position.set(5, 10, 5);
  scene.add(dir);
  scene.add(new T.HemisphereLight(0xbbddff, 0x335522, 0.5));

  // OrbitControls (r105 compatible - dans THREE namespace)
  var controls = null;
  if (T.OrbitControls) {
    controls = new T.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.15;
    controls.minDistance = 2;
    controls.maxDistance = 30;
  }

  // Chargement GLTFLoader depuis fichier local
  function loadModel() {
    if (!T.GLTFLoader) { console.warn('GLTFLoader non disponible'); return; }
    var loader = new T.GLTFLoader();
    loader.load('/assets/3D/planes.glb', function(gltf) {
      var box = new T.Box3().setFromObject(gltf.scene);
      var center = box.getCenter(new T.Vector3());
      var size = box.getSize(new T.Vector3());
      var maxDim = Math.max(size.x, size.y, size.z);
      var scale = 6 / maxDim;
      gltf.scene.scale.setScalar(scale);
      center.multiplyScalar(scale);
      gltf.scene.position.set(-center.x, -center.y, -center.z);
      scene.add(gltf.scene);
    }, undefined, function(err) {
      console.error('Erreur GLB:', err);
    });
  }

  function animate() {
    requestAnimationFrame(animate);
    if (controls) controls.update();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', function() {
    var nw = container.clientWidth;
    var nh = container.clientHeight;
    camera.aspect = nw / nh;
    camera.updateProjectionMatrix();
    renderer.setSize(nw, nh);
  });

  animate();

  // Charger OrbitControls et GLTFLoader locaux APRÈS que PANOLENS ait fini
  // Ils s'enregistrent dans THREE namespace
  var s1 = document.createElement('script');
  s1.src = '/assets/js/OrbitControls.js';
  s1.onload = function() {
    controls = new T.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.15;
    controls.minDistance = 2;
    controls.maxDistance = 30;

    var s2 = document.createElement('script');
    s2.src = '/assets/js/GLTFLoader.js';
    s2.onload = loadModel;
    document.body.appendChild(s2);
  };
  document.body.appendChild(s1);
})();
</script>
